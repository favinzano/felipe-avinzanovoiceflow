name: Auto Release Notes

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  generate:
    name: Generate release notes draft
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Generate release notes
        run: npm run release:notes

      # This used to publish a `draft: true` GitHub Release via
      # softprops/action-gh-release. That creates its own release object for
      # the tag, separate from (and racing) the real release that
      # release.yml's build-and-publish job creates once the Windows/macOS/
      # Linux installers finish building -- the two are never reconciled, so
      # the repo ends up with an empty orphaned draft alongside the real,
      # asset-bearing release. Publish the draft text as a build artifact
      # instead; the real release's notes are curated by hand from this file
      # once the installers are ready.
      - name: Upload release notes draft
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-draft
          path: release-notes-draft.md
          if-no-files-found: error
