name: Windows Release Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      TESTING_REMOTELY: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Load brand contract
        shell: pwsh
        run: |
          $brand = Get-Content -LiteralPath "src/brand-config.json" -Raw | ConvertFrom-Json
          "PRODUCT_SLUG=$($brand.slug)" >> $env:GITHUB_ENV
          "PRODUCT_DISPLAY_NAME=$($brand.displayName)" >> $env:GITHUB_ENV
          "HELPER_EXECUTABLE=$($brand.helperBaseName).exe" >> $env:GITHUB_ENV
      - run: npm test
      - run: npm run test:production
      - name: Verify Windows ONNX Runtime native binding
        run: npm run test:onnx-runtime
      - name: Run full Whisper smoke (known upstream Windows runner flake)
        continue-on-error: true
        run: npm run test:models
      - run: npm audit --omit=dev --audit-level=critical
      - run: npm run release:win
      - run: npm run release:verify
      - name: Verify packaged Windows native runtime
        run: node scripts/verify-packaged-platform.cjs "--resources=release/win-unpacked/resources" "--platform=win32" "--arch=x64"
      - run: npm run release:test-models
      - run: npm run release:test-installer
      - run: npm run release:test-tray
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PRODUCT_SLUG }}-windows
          path: |
            release/${{ env.PRODUCT_SLUG }}-Setup-*.exe
            release/${{ env.PRODUCT_SLUG }}-Setup-*.exe.blockmap
            release/latest.yml
            release/${{ env.PRODUCT_SLUG }}-Setup-*.sha256
