name: Windows Release Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      TESTING_REMOTELY: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:production
      - run: npm run test:models
      - run: npm audit --omit=dev
      - run: npm run release:win
      - run: npm run release:verify
      - run: npm run release:test-models
      - run: npm run release:test-installer
      - run: npm run release:test-tray
      - uses: actions/upload-artifact@v4
        with:
          name: felipe-avinzanovoiceflow-windows
          path: |
            release/felipe-avinzanovoiceflow-Setup-*.exe
            release/felipe-avinzanovoiceflow-Setup-*.exe.blockmap
            release/latest.yml
            release/felipe-avinzanovoiceflow-Setup-*.sha256
