name: Signed Windows Release

on:
  workflow_dispatch:

jobs:
  build-sign-verify:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      TESTING_REMOTELY: "true"
      SIGNING_PFX_BASE64: ${{ secrets.SIGNING_PFX_BASE64 }}
      SIGNING_PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}
      SIGNING_TIMESTAMP_URL: http://timestamp.digicert.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:production
      - run: npm run test:models
      - run: npm run release:verify-acceptance
      - run: npm run release:signed
      - uses: actions/upload-artifact@v4
        with:
          name: nextstepai-voice-windows-signed
          path: |
            release/NextStepAI-Voice-Setup-*.exe
            release/NextStepAI-Voice-Setup-*.exe.blockmap
            release/latest.yml
