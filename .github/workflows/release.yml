name: Multiplatform Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64 (${{ matrix.target }})
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: legacy
            flavor: Legacy
          - target: avx2
            flavor: AVX2

    env:
      TESTING_REMOTELY: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      # Both matrix jobs use the same keys. This avoids downloading Electron and
      # electron-builder toolchains again after the first cache is populated.
      - name: Restore shared Electron caches
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: windows-x64-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            windows-x64-electron-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Configure build target
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $brand = Get-Content -LiteralPath "src/brand-config.json" -Raw | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "No se pudo leer la version desde package.json."
          }

          if ("${{ matrix.target }}" -eq "avx2") {
            if (-not [System.Runtime.Intrinsics.X86.Avx2]::IsSupported) {
              throw "El runner seleccionado no soporta AVX2."
            }

            # Expose AVX2 flags to native components compiled by this workflow.
            # onnxruntime-node ships precompiled DLLs that perform AVX2 runtime
            # dispatch automatically; these flags do not rebuild those DLLs.
            "CL=/arch:AVX2" >> $env:GITHUB_ENV
            "CFLAGS=/arch:AVX2" >> $env:GITHUB_ENV
            "CXXFLAGS=/arch:AVX2" >> $env:GITHUB_ENV
          }

          $artifactName = "$($brand.slug)-Setup-$version-${{ matrix.flavor }}-x64.exe"
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_FLAVOR=${{ matrix.flavor }}" >> $env:GITHUB_ENV
          "INSTALLER_NAME=$artifactName" >> $env:GITHUB_ENV
          "PRODUCT_SLUG=$($brand.slug)" >> $env:GITHUB_ENV
          "PRODUCT_DISPLAY_NAME=$($brand.displayName)" >> $env:GITHUB_ENV

      - name: Run production tests
        run: npm run test:production

      - name: Build application assets
        run: npm run build

      - name: Build native Windows helper
        run: npm run build:native

      - name: Build application icons
        run: npm run build:icons

      - name: Compress native libraries
        run: npm run pre-release

      - name: Package ${{ matrix.target }} installer
        shell: pwsh
        run: |
          npx electron-builder --win nsis --x64 --publish never "--config.win.artifactName=$env:INSTALLER_NAME"
          if ($LASTEXITCODE -ne 0) {
            throw "electron-builder fallo para el target ${{ matrix.target }}."
          }

          $installer = Join-Path "release" $env:INSTALLER_NAME
          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            throw "No se genero el instalador esperado: $installer"
          }

          $hash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $env:INSTALLER_NAME" | Set-Content -LiteralPath "$installer.sha256" -Encoding ascii

      - name: Upload ${{ matrix.target }} installer
        uses: actions/upload-artifact@v4
        with:
          name: felipe-avinzanovoiceflow-${{ matrix.target }}-windows-x64
          if-no-files-found: error
          retention-days: 30
          path: |
            release/felipe-avinzanovoiceflow-Setup-*-${{ matrix.flavor }}-x64.exe
            release/felipe-avinzanovoiceflow-Setup-*-${{ matrix.flavor }}-x64.exe.blockmap
            release/felipe-avinzanovoiceflow-Setup-*-${{ matrix.flavor }}-x64.exe.sha256
            release/latest.yml

  build-macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      TESTING_REMOTELY: "true"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run production tests
        run: npm run test:production

      - name: Package macOS installers
        run: npm run release:mac

      - name: Verify macOS packages
        run: |
          set -euo pipefail
          for ARCH in arm64 x64; do
            DMG=$(find release -maxdepth 1 -name "*-${ARCH}.dmg" | head -n1)
            if [ -z "$DMG" ]; then
              echo "No se genero ningun .dmg para $ARCH en release/." >&2
              exit 1
            fi
            # electron-builder names the x64 output dir "mac" (implicit default)
            # and every other arch "mac-<arch>".
            if [ "$ARCH" = "x64" ]; then
              APP_DIR="release/mac"
            else
              APP_DIR="release/mac-${ARCH}"
            fi
            APP=$(find "$APP_DIR" -maxdepth 1 -name '*.app' 2>/dev/null | head -n1)
            if [ -z "$APP" ]; then
              echo "No se genero ningun paquete .app para $ARCH en $APP_DIR." >&2
              exit 1
            fi
            test -f "$APP/Contents/Resources/app.asar" || { echo "Falta app.asar dentro del bundle $ARCH." >&2; exit 1; }
            ONNX_DARWIN="$APP/Contents/Resources/app.asar.unpacked/node_modules/onnxruntime-node/bin/napi-v3/darwin"
            test -d "$ONNX_DARWIN" || { echo "Falta el binario nativo de ONNX Runtime para darwin ($ARCH): $ONNX_DARWIN" >&2; exit 1; }
            echo "macOS package verified for $ARCH: $DMG"
          done

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: felipe-avinzanovoiceflow-macos
          if-no-files-found: error
          retention-days: 30
          path: |
            release/felipe-avinzanovoiceflow-Setup-*.dmg
            release/latest-mac.yml

  build-linux:
    name: Build Linux (x64 AppImage)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TESTING_REMOTELY: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run production tests
        run: npm run test:production

      - name: Package Linux installer
        run: npm run release:linux

      - name: Verify Linux package
        run: |
          set -euo pipefail
          APPIMAGE=$(find release -maxdepth 1 -name '*.AppImage' | head -n1)
          if [ -z "$APPIMAGE" ]; then
            echo "No se genero ningun .AppImage en release/." >&2
            exit 1
          fi
          chmod +x "$APPIMAGE"
          EXTRACT_DIR="$(mktemp -d)"
          (cd "$EXTRACT_DIR" && "$OLDPWD/$APPIMAGE" --appimage-extract >/dev/null)
          test -f "$EXTRACT_DIR/squashfs-root/resources/app.asar" || { echo "Falta app.asar dentro del AppImage." >&2; exit 1; }
          ONNX_LINUX="$EXTRACT_DIR/squashfs-root/resources/app.asar.unpacked/node_modules/onnxruntime-node/bin/napi-v3/linux"
          test -d "$ONNX_LINUX" || { echo "Falta el binario nativo de ONNX Runtime para linux: $ONNX_LINUX" >&2; exit 1; }
          echo "Linux package verified: $APPIMAGE"

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: felipe-avinzanovoiceflow-linux
          if-no-files-found: error
          retention-days: 30
          path: |
            release/felipe-avinzanovoiceflow-Setup-*.AppImage
            release/latest-linux.yml

  publish-prerelease:
    name: Publish unsigned GitHub pre-release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          pattern: felipe-avinzanovoiceflow-*-windows-x64
          path: release-assets

      - name: Download macOS installers
        uses: actions/download-artifact@v4
        with:
          name: felipe-avinzanovoiceflow-macos
          path: release-assets/macos

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: felipe-avinzanovoiceflow-linux
          path: release-assets/linux

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Both flavors emit a file literally named latest.yml, so only one can
          # be published under that name (electron-updater's Windows channel file
          # has no per-flavor naming). AVX2 covers the vast majority of modern
          # CPUs, so it is the auto-update channel; Legacy stays a manual download.
          cp release-assets/felipe-avinzanovoiceflow-avx2-windows-x64/latest.yml release-assets/latest.yml

          gh release create "$RELEASE_TAG" \
            release-assets/**/*.exe \
            release-assets/**/*.exe.blockmap \
            release-assets/**/*.exe.sha256 \
            release-assets/latest.yml \
            release-assets/macos/*.dmg \
            release-assets/macos/latest-mac.yml \
            release-assets/linux/*.AppImage \
            release-assets/linux/latest-linux.yml \
            --repo "favinzano/felipe-avinzanovoiceflow" \
            --title "felipe avinzano VoiceFlow $RELEASE_TAG" \
            --generate-notes \
            --prerelease \
            --verify-tag
