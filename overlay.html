<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self';" />
    <title>felipe avinzano VoiceFlow</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <main class="overlay" data-status="recording" id="overlay">
      <div class="brand-row">
        <span class="brand-lockup overlay-brand" role="img" aria-label="VoiceFlow">
          <svg class="brand-symbol" viewBox="98 98 206 206" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="105" y="120" width="160" height="160" fill="currentColor" transform="rotate(-4 185 200)" />
            <rect class="brand-symbol__outline" x="135" y="120" width="160" height="160" fill="none" stroke="currentColor" vector-effect="non-scaling-stroke" transform="rotate(4 215 200)" />
          </svg>
          <span class="brand-wordmark" aria-hidden="true"><span class="brand-wordmark__voice">Voice</span><span class="brand-wordmark__flow brand-flow" data-brand-suffix>Flow</span></span>
        </span>
        <span class="status-dot"></span>
      </div>
      <canvas class="signal" id="signal" aria-hidden="true"></canvas>
      <div class="message-row">
        <span id="message">Escuchando. Presiona el atajo para convertir.</span>
        <b id="timer">00:00</b>
      </div>
    </main>
    <script src="overlay.js"></script>
  </body>
</html>
