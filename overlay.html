<!doctype html>
<html lang="es">
  <head>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self';" />
    <title>felipe avinzano VoiceFlow</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <main class="overlay" data-status="recording" id="overlay">
      <div class="brand-row">
        <span class="incision"><i></i><i></i></span>
        <strong data-brand-label aria-label="felipe avinzano VoiceFlow"><span data-brand-base>felipe avinzano Voice</span><span class="brand-flow" data-brand-suffix>Flow</span></strong>
